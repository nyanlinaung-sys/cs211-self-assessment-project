<!DOCTYPE html>
<html>
<head>
    <title>Instructor Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Change flex-direction to column so items stack vertically */
        body { 
            background: #f8f9fa; 
            display: flex; 
            flex-direction: column;
            min-height: 100vh; 
            margin: 0;
        }
        
        /* This container will grow to fill all available space, pushing the footer down */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 450px; 
        }
        
        .btn-primary {
            background-color: #2563EB;
            padding: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="login-card shadow">
            <h2 class="text-center mb-4" style="color: #0a2162; font-weight: 700;">CS211 Analytics</h2>
            <p class="text-center text-muted mb-4">Please log in to access the student dashboard.</p>
            
            <form action="/login" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">Professor Name</label>
                    <select name="professor" class="form-select form-select-lg" required>
                        <option value="" disabled selected>Select your name...</option>
                        <option value="Taesik Kim">Taesik Kim</option>
                        <option value="Tanuja Joshi">Tanuja Joshi</option>
                        <option value="Varik Hoang">Varik Hoang</option>
                        <option value="Joseph Hueffed">Joseph Hueffed</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Access Key</label>
                    <input type="password" name="key" class="form-control form-control-lg" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 shadow-sm">Access Dashboard</button>
            </form>
        </div>
    </div>

    <footer class="text-center py-4 text-muted bg-white border-top">
        <p class="small mb-0">
            &copy; 2026 Bellevue College &bull; Computer Science Department
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
