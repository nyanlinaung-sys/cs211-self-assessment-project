<!DOCTYPE html>
<html>
<head>
    <title>Instructor Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: white; padding: 2rem; border-radius: 15px; width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="login-card shadow">
        <h3 class="text-center mb-4">CS211 Analytics Login</h3>
        <form action="/login" method="post">
            <div class="mb-3">
                <label class="form-label">Professor Name</label>
                <select name="professor" class="form-select" required>
                    <option value="" disabled selected>Select your name...</option>
                    <option value="Taesik Kim">Taesik Kim</option>
                    <option value="Tanuja Joshi">Tanuja Joshi</option>
                    <option value="Varik Hoang">Varik Hoang</option>
                    <option value="Joseph Hueffed">Joseph Hueffed</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label">Access Key</label>
                <input type="password" name="key" class="form-control" placeholder="Enter security key" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Access Dashboard</button>
        </form>
    </div>

    <footer class="text-center mt-5 pb-4 text-muted">
        <hr class="mb-4" style="opacity: 0.1;">
        <p class="small">
            &copy; 2026 Bellevue College - Computer Science Department.<br>
        </p>
    </footer>
</body>
</html>
