<!DOCTYPE html>
<html>
<head>
    <title>CS211 Placement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #F8FAFC; color: #1E293B; font-weight: 700; }
        .main-header {
            background: #0a2162;
            padding: 30px; border-radius: 15px; color: white; text-align: center; margin-top: 2rem;
        }
        .card { border-radius: 15px; border: 2px solid #E2E8F0; padding: 20px; margin-top: 20px; }
        .btn-primary { background-color: #2563EB; border: none; padding: 10px 25px; }
    </style>
</head>
<body class="container">
    <div class="main-header">
        <h1>CS211 Placement Test</h1>
        <h2>Department of Computer Science, Bellevue College</h2>
    </div>
    <div class="card shadow-sm">
        <h3>Candidate Registration</h3>
        <form action="/quiz" method="post" class="card p-4 shadow-sm">
    <div class="mb-3">
        <label class="form-label">Student ID</label>
        <input type="text" name="sid" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" required>
    </div>
    <div class="mb-3">
    <label for="professor" class="form-label">Select Your Professor</label>
    <select class="form-select" id="professor" name="professor" required>
        <option value="" selected disabled>Choose...</option>
        <option value="Taesik Kim">Taesik Kim</option>
    </select>
</div>

    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="form-label">Session</label>
            <select name="session" class="form-select" required>
                <option value="" selected disabled>Choose...</option>
                <option value="1">Session 1</option>
                <option value="2">Session 2</option>
                <option value="3">Session 3</option>
                <option value="4">Session 4</option>
            </select>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Quarter</label>
            <select name="quarter" class="form-select" required>
                <option value="" selected disabled>Choose...</option>
                <option value="Spring">Spring</option>
                <option value="Summer">Summer</option>
                <option value="Fall">Fall</option>
                <option value="Winter">Winter</option>       
            </select>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Year</label>
            <select name="year" class="form-select" required>
                <option value="2026">2026</option>
                <option value="2027">2027</option>
            </select>
        </div>
    </div>
    <button type="submit" class="btn btn-primary w-100 mt-3">Start Assessment</button>
</form>
    </div>
</body>
<footer class="text-center mt-5 pb-4 text-muted">
    <hr class="mb-4" style="opacity: 0.1;">
    <p class="small">
        &copy; 2026 Bellevue College - Computer Science Department. All Rights Reserved.<br>
        Developed for the CS211 Placement Assessment Program.
    </p>
</footer>
</html>
