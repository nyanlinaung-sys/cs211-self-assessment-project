<!DOCTYPE html>
<html>
<head>
    <title>CS211 Placement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #F8FAFC; color: #1E293B; font-weight: 700; }
        .main-header {
            background: linear-gradient(135deg, #1E3A8A 0%, #3B82F6 100%);
            padding: 30px; border-radius: 15px; color: white; text-align: center; margin-top: 2rem;
        }
        .card { border-radius: 15px; border: 2px solid #E2E8F0; padding: 20px; margin-top: 20px; }
        .btn-primary { background-color: #2563EB; border: none; padding: 10px 25px; }
    </style>
</head>
<body class="container">
    <div class="main-header">
        <h1>CS211 Placement Test</h1>
        <p>Department of Computer Science, Bellevue College</p>
    </div>
    <div class="card shadow-sm">
        <h3>Candidate Registration</h3>
        <form action="/quiz" method="post">
            <div class="mb-3">
                <label>Student ID (8 digits):</label>
                <input type="text" name="sid" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Full Name:</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Start Assessment</button>
        </form>
    </div>
</body>
</html>
