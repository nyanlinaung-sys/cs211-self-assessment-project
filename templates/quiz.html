<!DOCTYPE html>
<html>
<head>
    <title>CS211 Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #F8FAFC; color: #1E293B; font-weight: 700; }
        .q-card { display: none; border-radius: 15px; border: 2px solid #E2E8F0; padding: 30px; background: white; margin-top: 20px; }
        .q-card.active { display: block; }
        .progress { height: 10px; border-radius: 5px; margin-bottom: 20px; }
        .form-check { padding: 12px; border: 1px solid #E2E8F0; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .form-check:hover { background-color: #F1F5F9; }
    </style>
</head>
<body class="container py-5">
    <div class="max-w-2xl mx-auto">
        <h2 class="mb-4 text-primary">CS211 Placement Assessment</h2>
        
        <form id="quizForm" action="/submit" method="post">
            <input type="hidden" name="sid" value="{{ sid }}">
            <input type="hidden" name="name" value="{{ name }}">

            {% for q in questions %}
            <div class="q-card shadow-sm" id="step-{{ loop.index0 }}">
                <div class="progress">
                    <div class="progress-bar bg-primary" style="width: {{ ((loop.index / questions|length) * 100)|int }}%"></div>
                </div>
                <p class="text-muted">Question {{ loop.index }} of {{ questions|length }}</p>
                <h4 class="mb-4">{{ q.question }}</h4>
                
                {% for opt in q.options %}
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="q_{{ q.id }}" value="{{ opt }}" id="q{{ q.id }}_{{ loop.index }}" required>
                    <label class="form-check-label w-100" for="q{{ q.id }}_{{ loop.index }}">
                        {{ opt }}
                    </label>
                </div>
                {% endfor %}

                <div class="mt-4 d-flex justify-content-between">
                    {% if not loop.first %}
                    <button type="button" class="btn btn-outline-secondary" onclick="prevStep({{ loop.index0 }})">Previous</button>
                    {% else %}
                    <div></div>
                    {% endif %}

                    {% if not loop.last %}
                    <button type="button" class="btn btn-primary px-4" onclick="nextStep({{ loop.index0 }})">Next Question</button>
                    {% else %}
                    <button type="submit" class="btn btn-success px-4">Finish Assessment</button>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </form>
    </div>

    <script>
        function nextStep(current) {
            const currentCard = document.getElementById('step-' + current);
            const radios = currentCard.querySelectorAll('input[type="radio"]');
            let checked = false;
            radios.forEach(r => { if(r.checked) checked = true; });
            
            if(!checked) {
                alert("Please select an answer before continuing.");
                return;
            }
            
            currentCard.classList.remove('active');
            document.getElementById('step-' + (current + 1)).classList.add('active');
            window.scrollTo(0,0);
        }

        function prevStep(current) {
            document.getElementById('step-' + current).classList.remove('active');
            document.getElementById('step-' + (current - 1)).classList.add('active');
            window.scrollTo(0,0);
        }

        // Initialize the first question
        document.getElementById('step-0').classList.add('active');
    </script>
</body>
</html>
